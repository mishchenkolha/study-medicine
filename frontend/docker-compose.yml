version: '3.8'

services:
  next-app:
    container_name: next-app-1
    platform: linux/amd64
    build: 
      context: .
      dockerfile: Dockerfile
    restart: always
    working_dir: /opt/app
    ports:
      - "3000:3000"
    # Секція для Hot Reload через Docker Watch
    develop:
      watch:
        - action: sync
          path: .
          target: /opt/app
          ignore:
            - node_modules/
            - .next/

    volumes:
      - /opt/app/node_modules
      - /opt/app/.next/cache
    environment:
      - NODE_ENV=development
      - NEXT_SWC_DISABLED=1
      - NEXT_DISABLE_SWC_WASM=1
      - NEXT_TELEMETRY_DISABLED=1
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
      - STRAPI_URL=http://host.docker.internal:1337
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge